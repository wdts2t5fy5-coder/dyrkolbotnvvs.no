    <main class="container">
      <section class="section">
        <h1>Ta kontakt med Dyrkolbotn VVS</h1>
        <p>
          Fyll ut skjemaet under. Da åpnes e-postklienten med ferdig melding til
          Aksel Dyrkolbotn.
        </p>
      </section>

      <form class="contact-form" id="contact-form">
        <label>
          Navn
          <input type="text" name="name" autocomplete="name" required />
        </label>
        <label>
          E-post
          <input type="email" name="email" autocomplete="email" required />
        </label>
        <label>
          Telefon
          <input type="tel" name="phone" autocomplete="tel" />
        </label>
        <label>
          Hva gjelder henvendelsen?
          <input type="text" name="subject" required />
        </label>
        <label>
          Beskrivelse
          <textarea
            name="message"
            rows="6"
            placeholder="Skriv litt om hva du ønsker hjelp med."
            required
          ></textarea>
        </label>
        <button class="button" type="submit">Åpne e-postmelding</button>
        <p class="form-help" id="form-help" aria-live="polite"></p>
      </form>
    </main>
